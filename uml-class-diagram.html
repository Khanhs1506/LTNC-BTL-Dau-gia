<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>UML Class Diagram — Auction System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; font-family: sans-serif; overflow: hidden; }
  #toolbar {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    background: white; border-radius: 8px; padding: 8px 16px;
    display: flex; gap: 12px; align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 100; font-size: 13px;
  }
  #toolbar button {
    border: 1px solid #ccc; background: #fafafa; border-radius: 4px;
    padding: 4px 10px; cursor: pointer; font-size: 13px;
  }
  #toolbar button:hover { background: #e8e8e8; }
  #legend {
    position: fixed; bottom: 10px; left: 10px; background: white;
    border-radius: 8px; padding: 10px 14px; font-size: 11px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15); line-height: 1.8;
  }
  .leg { display: flex; align-items: center; gap: 6px; }
  canvas { display: block; }
  #container { width: 100vw; height: 100vh; overflow: hidden; cursor: grab; }
  #container:active { cursor: grabbing; }
  svg { display: block; }
</style>
</head>
<body>
<div id="toolbar">
  <strong>UML — Auction System</strong>
  <button onclick="zoom(1.2)">＋ Zoom in</button>
  <button onclick="zoom(0.8)">－ Zoom out</button>
  <button onclick="resetView()">⊙ Reset</button>
  <span style="color:#888">Kéo để di chuyển • Scroll để zoom</span>
</div>
<div id="legend">
  <div class="leg"><svg width="30" height="12"><line x1="0" y1="6" x2="22" y2="6" stroke="#333" stroke-width="1.5"/><polygon points="22,2 30,6 22,10" fill="white" stroke="#333" stroke-width="1.5"/></svg> Kế thừa</div>
  <div class="leg"><svg width="30" height="12"><line x1="0" y1="6" x2="22" y2="6" stroke="#333" stroke-width="1.5" stroke-dasharray="4,2"/><polygon points="22,2 30,6 22,10" fill="white" stroke="#333" stroke-width="1.5"/></svg> Thực thi interface</div>
  <div class="leg"><svg width="30" height="12"><line x1="0" y1="6" x2="30" y2="6" stroke="#555" stroke-width="1.5"/><polygon points="26,2 30,6 26,10" fill="#555"/></svg> Liên kết (uses)</div>
  <div class="leg"><svg width="30" height="12"><line x1="0" y1="6" x2="30" y2="6" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/><polygon points="26,2 30,6 26,10" fill="#555"/></svg> Phụ thuộc</div>

  <hr style="margin:4px 0; border-color:#ddd">
  <div class="leg"><span style="background:#DBEAFE;border:1px solid #93C5FD;padding:1px 5px;border-radius:3px;font-size:10px">model</span></div>

  <div class="leg"><span style="background:#CCFBF1;border:1px solid #5EEAD4;padding:1px 5px;border-radius:3px;font-size:10px">client</span></div>
</div>

<script>
  const container = document.getElementById('container');
  const svg = document.getElementById('diagram');
  let scale = 0.55, tx = 0, ty = 0;
  let dragging = false, startX, startY, startTx, startTy;

  function applyTransform() {
    svg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    svg.style.transformOrigin = '0 0';
  }

  function zoom(factor) {
    scale = Math.min(Math.max(scale * factor, 0.2), 3);
    applyTransform();
  }

  function resetView() {
    scale = 0.55; tx = 20; ty = 40;
    applyTransform();
  }

  container.addEventListener('mousedown', e => {
    dragging = true; startX = e.clientX; startY = e.clientY;
    startTx = tx; startTy = ty;
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = startTx + (e.clientX - startX);
    ty = startTy + (e.clientY - startY);
    applyTransform();
  });
  document.addEventListener('mouseup', () => dragging = false);
  container.addEventListener('wheel', e => {
    e.preventDefault();
    zoom(e.deltaY < 0 ? 1.1 : 0.9);
  }, { passive: false });

  resetView();
</script>
